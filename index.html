<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TikTalk Milktea 茶语奶茶</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #f6efe6;
      --paper: #fffaf4;
      --gold: #b9803b;
      --gold-deep: #8e5f27;
      --ink: #3d2b1f;
      --muted: #8d7763;
      --line: rgba(125, 86, 39, 0.14);
      --card: rgba(255,255,255,0.82);
    }
    body {
      background:
        radial-gradient(circle at top right, rgba(210, 167, 96, .18), transparent 28%),
        radial-gradient(circle at top left, rgba(255, 255, 255, .65), transparent 24%),
        linear-gradient(180deg, #f9f3ec 0%, #f3eadf 100%);
      color: var(--ink);
    }
    .app-shell {
      background:
        linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.7)),
        linear-gradient(180deg, #f9f3ec 0%, #f4ebdf 100%);
      backdrop-filter: blur(14px);
    }
    .safe-bottom { padding-bottom: calc(118px + env(safe-area-inset-bottom)); }
    .soft-card {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(94, 64, 33, .08);
      backdrop-filter: blur(10px);
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .category-chip::-webkit-scrollbar,
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .menu-card:hover { transform: translateY(-1px); }
    .hero-pattern {
      background:
        linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,0)),
        radial-gradient(circle at 10% 10%, rgba(255,255,255,.18), transparent 30%),
        linear-gradient(135deg, #7b4d28 0%, #b9803b 58%, #dfbb82 100%);
    }
    .ornament {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      height: 1px;
    }
    .floating-checkout {
      background: rgba(255,250,244,.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -6px 20px rgba(91, 61, 27, .08);
    }
  </style>
</head>
<body>
  <div id="app" class="app-shell max-w-md mx-auto min-h-screen safe-bottom shadow-[0_8px_30px_rgba(78,54,24,.08)]">
    <header class="sticky top-0 z-30 px-4 pt-4 pb-3 bg-gradient-to-b from-[#f8f0e7]/95 to-[#f8f0e7]/70 backdrop-blur-xl border-b border-[rgba(125,86,39,.10)]">
      <div class="hero-pattern rounded-[28px] p-4 text-white shadow-[0_14px_30px_rgba(94,64,33,.18)] overflow-hidden relative">
        <div class="absolute top-0 right-0 w-28 h-28 rounded-full bg-white/10 blur-2xl"></div>
        <div class="relative">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-[11px] tracking-[0.28em] uppercase text-white/75">TikTalk Milktea</div>
              <h1 class="mt-1 text-2xl font-bold tracking-wide">茶语奶茶</h1>
              <p class="mt-1 text-sm text-white/80">新中式茶饮 · 小食甜品 · Telegram Mini App</p>
            </div>
            <button id="cartBtn" class="soft-card bg-white/15 border-white/15 text-white px-4 py-2.5 rounded-full text-sm font-semibold">
              购物袋 <span id="cartCount" class="ml-1">0</span>
            </button>
          </div>
          <div class="ornament mt-4 mb-3"></div>
          <div class="grid grid-cols-3 gap-2 text-center">
            <div class="rounded-2xl bg-white/10 px-2 py-2">
              <div class="text-[11px] text-white/70">风格</div>
              <div class="text-sm font-semibold">茶饮轻奢</div>
            </div>
            <div class="rounded-2xl bg-white/10 px-2 py-2">
              <div class="text-[11px] text-white/70">下单</div>
              <div class="text-sm font-semibold">即时点餐</div>
            </div>
            <div class="rounded-2xl bg-white/10 px-2 py-2">
              <div class="text-[11px] text-white/70">支持</div>
              <div class="text-sm font-semibold">备注定制</div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex items-center gap-2 soft-card rounded-2xl px-3 py-2.5">
        <span class="text-sm text-[var(--gold)]">🔎</span>
        <input id="searchInput" class="w-full bg-transparent outline-none text-sm placeholder:text-[var(--muted)]" placeholder="搜索饮品、小吃、甜品" />
      </div>

      <div id="categoryTabs" class="category-chip hide-scrollbar flex gap-2 overflow-x-auto pt-3"></div>
    </header>

    <main class="px-4 pb-6">
      <section class="pt-4">
        <div class="flex items-center justify-between mb-3">
          <div>
            <div id="currentCategoryName" class="text-lg font-bold">店长推荐</div>
            <div id="currentCategoryDesc" class="text-xs text-[var(--muted)] mt-1">精选人气款，适合首次下单</div>
          </div>
          <div class="text-xs text-[var(--muted)]" id="resultCount">0 款商品</div>
        </div>
        <div id="productList" class="grid grid-cols-2 gap-3"></div>
      </section>
    </main>
  </div>

  <div id="productModal" class="hidden fixed inset-0 z-40 bg-black/45 backdrop-blur-sm">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-[#fffaf4] rounded-t-[30px] p-4 border border-[rgba(125,86,39,.10)] shadow-[0_-12px_30px_rgba(78,54,24,.12)] max-h-[92vh] overflow-auto">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="soft-card rounded-[26px] overflow-hidden">
        <div class="hero-pattern p-5 text-white">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-[11px] tracking-[0.24em] uppercase text-white/70">Menu Item</div>
              <h2 id="modalName" class="mt-1 text-xl font-bold"></h2>
              <p id="modalPrice" class="mt-2 text-white/90 text-sm"></p>
            </div>
            <button onclick="closeProductModal()" class="w-9 h-9 rounded-full bg-white/15 text-xl leading-none">×</button>
          </div>
        </div>
        <div class="p-4 space-y-4">
          <div class="grid grid-cols-3 gap-3 text-sm">
            <div class="rounded-2xl bg-[#f8f1e7] p-3 border border-[rgba(125,86,39,.08)]">
              <div class="text-[var(--muted)] text-xs">商品价格</div>
              <div id="basePriceText" class="mt-1 font-semibold"></div>
            </div>
            <div class="rounded-2xl bg-[#f8f1e7] p-3 border border-[rgba(125,86,39,.08)]">
              <div class="text-[var(--muted)] text-xs">加料价格</div>
              <div id="toppingPriceText" class="mt-1 font-semibold">₱0</div>
            </div>
            <div class="rounded-2xl bg-[#fff3de] p-3 border border-[rgba(185,128,59,.18)]">
              <div class="text-[var(--muted)] text-xs">当前单价</div>
              <div id="currentUnitPriceText" class="mt-1 font-bold text-[var(--gold-deep)]"></div>
            </div>
          </div>

          <div>
            <div class="text-sm font-semibold mb-2">甜度</div>
            <div id="sugarOptions" class="flex flex-wrap gap-2"></div>
          </div>

          <div>
            <div class="text-sm font-semibold mb-2">冰度</div>
            <div id="iceOptions" class="flex flex-wrap gap-2"></div>
          </div>

          <div>
            <div class="text-sm font-semibold mb-2">加料</div>
            <div id="toppingOptions" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="soft-card rounded-2xl p-3 flex items-center justify-between">
            <div>
              <div class="text-xs text-[var(--muted)]">数量</div>
              <div class="text-sm font-semibold">可自由调整份数</div>
            </div>
            <div class="flex items-center gap-3">
              <button id="qtyMinus" class="w-10 h-10 rounded-full bg-[#f5eadc] text-lg">-</button>
              <span id="qtyValue" class="w-8 text-center font-semibold">1</span>
              <button id="qtyPlus" class="w-10 h-10 rounded-full bg-[#f5eadc] text-lg">+</button>
            </div>
          </div>

          <button id="addToCartBtn" class="w-full py-3.5 rounded-full bg-[var(--gold)] text-white font-semibold shadow-[0_10px_20px_rgba(185,128,59,.24)]">加入购物车</button>
        </div>
      </div>
    </div>
  </div>

  <div id="cartDrawer" class="hidden fixed inset-0 z-50 bg-black/45 backdrop-blur-sm">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-[#fffaf4] rounded-t-[30px] p-4 max-h-[88vh] overflow-hidden flex flex-col border border-[rgba(125,86,39,.10)]">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold">购物袋</h2>
        <button onclick="closeCart()" class="w-9 h-9 rounded-full bg-[#f2e7d9] text-xl leading-none">×</button>
      </div>
      <div id="cartItems" class="flex-1 overflow-auto space-y-3 pr-1"></div>
      <div class="border-t border-[rgba(125,86,39,.10)] pt-4 mt-4">
        <div class="flex items-center justify-between mb-3 text-base font-semibold">
          <span>合计</span>
          <span id="cartTotal">₱0</span>
        </div>
        <button id="goCheckoutBtn" class="w-full py-3.5 rounded-full bg-[var(--gold)] text-white font-semibold">去结算</button>
      </div>
    </div>
  </div>

  <div id="checkoutDrawer" class="hidden fixed inset-0 z-50 bg-black/45 backdrop-blur-sm">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-[#fffaf4] rounded-t-[30px] p-4 max-h-[92vh] overflow-auto border border-[rgba(125,86,39,.10)]">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold">确认订单</h2>
        <button onclick="closeCheckout()" class="w-9 h-9 rounded-full bg-[#f2e7d9] text-xl leading-none">×</button>
      </div>

      <div class="soft-card rounded-[26px] p-4 space-y-3">
        <div>
          <div class="text-sm font-semibold mb-2">收货信息</div>
          <div class="grid gap-3">
            <input id="customerName" class="w-full border border-[rgba(125,86,39,.10)] bg-white rounded-2xl px-4 py-3 outline-none" placeholder="联系人姓名" />
            <input id="customerPhone" class="w-full border border-[rgba(125,86,39,.10)] bg-white rounded-2xl px-4 py-3 outline-none" placeholder="联系电话" />
            <textarea id="customerAddress" class="w-full border border-[rgba(125,86,39,.10)] bg-white rounded-2xl px-4 py-3 min-h-[100px] outline-none" placeholder="收货地址"></textarea>
            <textarea id="customerNote" class="w-full border border-[rgba(125,86,39,.10)] bg-white rounded-2xl px-4 py-3 min-h-[90px] outline-none" placeholder="备注（例如少冰、餐具、配送提示）"></textarea>
          </div>
        </div>
      </div>

      <div class="soft-card rounded-[26px] p-4 mt-4">
        <div class="text-sm font-semibold mb-3">订单预览</div>
        <div id="checkoutSummary" class="space-y-2 text-sm"></div>
      </div>

      <button id="submitOrderBtn" class="w-full mt-4 py-3.5 rounded-full bg-emerald-600 text-white font-semibold shadow-[0_10px_20px_rgba(16,185,129,.18)]">提交订单（当前为演示版）</button>
    </div>
  </div>

  <div class="floating-checkout fixed bottom-0 inset-x-0 z-20 max-w-md mx-auto px-4 pt-3 pb-[calc(14px+env(safe-area-inset-bottom))]">
    <div class="soft-card rounded-[24px] px-4 py-3 flex items-center justify-between gap-3">
      <div>
        <div class="text-xs text-[var(--muted)]">已选商品</div>
        <div class="text-base font-bold"><span id="floatingCartCount">0</span> 件 · <span id="floatingCartTotal">₱0</span></div>
      </div>
      <button onclick="openCart()" class="px-5 py-3 rounded-full bg-[var(--gold)] text-white font-semibold whitespace-nowrap">查看购物袋</button>
    </div>
  </div>

        ]
      }
    };

    function peso(n) {
      return `₱${Number(n).toFixed(0)}`;
    }

    function initTelegram() {
      if (!APP.telegram) return;
      APP.telegram.ready();
      APP.telegram.expand();
      APP.telegram.setHeaderColor('#f8f0e7');
      APP.telegram.setBackgroundColor('#f6efe6');
    }

    function chipBase(active) {
      return active
        ? 'px-4 py-2 rounded-full bg-[var(--gold)] text-white text-sm whitespace-nowrap shadow-[0_6px_16px_rgba(185,128,59,.22)]'
        : 'px-4 py-2 rounded-full bg-white border border-[rgba(125,86,39,.10)] text-[var(--ink)] text-sm whitespace-nowrap';
    }

    function optionChip(active) {
      return active
        ? 'px-3 py-2 rounded-full bg-[var(--gold)] text-white text-sm'
        : 'px-3 py-2 rounded-full bg-[#f7ecde] text-[var(--ink)] text-sm border border-[rgba(125,86,39,.08)]';
    }

    function renderCategories() {
      const wrap = document.getElementById('categoryTabs');
      wrap.innerHTML = APP.data.categories.map(cat => `
        <button class="${chipBase(APP.state.activeCategory === cat.id)}" onclick="setCategory('${cat.id}')">${cat.name}</button>
      `).join('');
    }

    function getFilteredProducts() {
      const keyword = APP.state.search.trim().toLowerCase();
      return APP.data.products.filter(p => p.category === APP.state.activeCategory)
        .filter(p => !keyword || p.name.toLowerCase().includes(keyword) || p.id.toLowerCase().includes(keyword));
    }

    function renderProducts() {
      const list = document.getElementById('productList');
      const products = getFilteredProducts();
      const cat = APP.data.categories.find(x => x.id === APP.state.activeCategory);
      document.getElementById('currentCategoryName').textContent = cat?.name || '菜单';
      document.getElementById('currentCategoryDesc').textContent = APP.categoryMeta[APP.state.activeCategory] || '请选择商品';
      document.getElementById('resultCount').textContent = `${products.length} 款商品`;

      if (!products.length) {
        list.innerHTML = `<div class="col-span-2 soft-card rounded-[24px] p-8 text-center text-[var(--muted)]">没有找到匹配商品</div>`;
        return;
      }

      list.innerHTML = products.map((p, index) => `
        <button onclick="openProductModal('${p.id}')" class="menu-card text-left soft-card rounded-[24px] p-3 transition-all duration-200">
          <div class="rounded-[20px] h-32 mb-3 p-3 text-white ${index % 5 === 0 ? 'hero-pattern' : index % 5 === 1 ? 'bg-gradient-to-br from-[#9c6a34] to-[#d3a96d]' : index % 5 === 2 ? 'bg-gradient-to-br from-[#6d4d2f] to-[#b37c47]' : index % 5 === 3 ? 'bg-gradient-to-br from-[#7b5b3a] to-[#d6b582]' : 'bg-gradient-to-br from-[#8c5e32] to-[#c89a5b]'} flex flex-col justify-between shadow-[inset_0_1px_0_rgba(255,255,255,.25)]">
            <div class="text-[11px] tracking-[0.18em] uppercase text-white/75">${p.id}</div>
            <div class="text-4xl leading-none self-end">${pickEmoji(p.category)}</div>
          </div>
          <div class="font-semibold text-sm line-clamp-2 min-h-[40px]">${p.name}</div>
          <div class="text-xs text-[var(--muted)] mt-1 line-clamp-2 min-h-[32px]">${p.desc}</div>
          <div class="mt-3 flex items-center justify-between">
            <div class="text-[var(--gold-deep)] font-bold">${peso(p.price)}</div>
            <div class="text-[11px] px-2 py-1 rounded-full bg-[#f6ecdf] text-[var(--gold-deep)]">选规格</div>
          </div>
        </button>
      `).join('');
    }

    function pickEmoji(category) {
      const map = {
        recommended: '✨',
        'milk-tea': '🧋',
        'fruit-tea': '🍋',
        'milk-cover': '🥛',
        'fresh-juice': '🍓',
        coffee: '☕',
        fruits: '🍍',
        dessert: '🍰',
        goddess: '🌸',
        snacks: '🍟',
        hamburg: '🍔',
        pancake: '🌯'
      };
      return map[category] || '🍽️';
    }

    function setCategory(id) {
      APP.state.activeCategory = id;
      renderCategories();
      renderProducts();
    }

    function openProductModal(productId) {
      const product = APP.data.products.find(p => p.id === productId);
      APP.state.currentProduct = product;
      APP.state.currentQty = 1;
      APP.state.currentSugar = '100%';
      APP.state.currentIce = '正常冰';
      APP.state.currentToppings = [];

      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = `${product.id} · ${peso(product.price)}`;
      document.getElementById('qtyValue').textContent = APP.state.currentQty;
      document.getElementById('basePriceText').textContent = peso(product.price);

      renderSugarOptions();
      renderIceOptions();
      renderToppings();
      updateModalPriceBreakdown();

      document.getElementById('productModal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.add('hidden');
    }

    function renderSugarOptions() {
      const box = document.getElementById('sugarOptions');
      box.innerHTML = APP.options.sugar.map(item => `
        <button class="${optionChip(APP.state.currentSugar === item)}" onclick="selectSugar('${item}')">${item}</button>
      `).join('');
    }

    function renderIceOptions() {
      const box = document.getElementById('iceOptions');
      box.innerHTML = APP.options.ice.map(item => `
        <button class="${optionChip(APP.state.currentIce === item)}" onclick="selectIce('${item}')">${item}</button>
      `).join('');
    }

    function renderToppings() {
      const box = document.getElementById('toppingOptions');
      box.innerHTML = APP.options.toppings.map(item => {
        const active = APP.state.currentToppings.includes(item.name);
        return `
          <button class="${optionChip(active)}" onclick="toggleTopping('${item.name}')">${item.name} · ${peso(item.price)}</button>
        `;
      }).join('');
      updateModalPriceBreakdown();
    }

    function selectSugar(v) {
      APP.state.currentSugar = v;
      renderSugarOptions();
    }

    function selectIce(v) {
      APP.state.currentIce = v;
      renderIceOptions();
    }

    function toggleTopping(name) {
      const idx = APP.state.currentToppings.indexOf(name);
      if (idx >= 0) APP.state.currentToppings.splice(idx, 1);
      else APP.state.currentToppings.push(name);
      renderToppings();
    }

    function getToppingPrice(names) {
      return names.reduce((sum, name) => {
        const t = APP.options.toppings.find(x => x.name === name);
        return sum + (t ? t.price : 0);
      }, 0);
    }

    function updateModalPriceBreakdown() {
      const product = APP.state.currentProduct;
      if (!product) return;
      const toppingPrice = getToppingPrice(APP.state.currentToppings);
      const unitPrice = product.price + toppingPrice;
      document.getElementById('basePriceText').textContent = peso(product.price);
      document.getElementById('toppingPriceText').textContent = peso(toppingPrice);
      document.getElementById('currentUnitPriceText').textContent = peso(unitPrice);
      document.getElementById('addToCartBtn').textContent = `加入购物袋 · ${peso(unitPrice * APP.state.currentQty)}`;
    }

    function addCurrentToCart() {
      const p = APP.state.currentProduct;
      if (!p) return;
      APP.state.cart.push({
        id: `cart_${Date.now()}`,
        productId: p.id,
        name: p.name,
        basePrice: p.price,
        sugar: APP.state.currentSugar,
        ice: APP.state.currentIce,
        toppings: [...APP.state.currentToppings],
        qty: APP.state.currentQty
      });
      renderCartBadge();
      closeProductModal();
    }

    function renderCartBadge() {
      const totalQty = APP.state.cart.reduce((sum, item) => sum + item.qty, 0);
      const total = getCartTotal();
      document.getElementById('cartCount').textContent = totalQty;
      document.getElementById('floatingCartCount').textContent = totalQty;
      document.getElementById('floatingCartTotal').textContent = peso(total);
    }

    function openCart() {
      renderCart();
      document.getElementById('cartDrawer').classList.remove('hidden');
    }

    function closeCart() {
      document.getElementById('cartDrawer').classList.add('hidden');
    }

    function getItemUnitPrice(item) {
      return item.basePrice + getToppingPrice(item.toppings);
    }

    function getCartTotal() {
      return APP.state.cart.reduce((sum, item) => sum + getItemUnitPrice(item) * item.qty, 0);
    }

    function renderCart() {
      const box = document.getElementById('cartItems');
      if (!APP.state.cart.length) {
        box.innerHTML = '<div class="soft-card rounded-[24px] p-8 text-sm text-[var(--muted)] text-center">购物袋还是空的，先挑一杯喜欢的吧。</div>';
      } else {
        box.innerHTML = APP.state.cart.map(item => `
          <div class="soft-card rounded-[24px] p-3">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1">
                <div class="font-semibold">${item.name}</div>
                <div class="text-xs text-[var(--muted)] mt-1">甜度 ${item.sugar} · 冰度 ${item.ice}</div>
                <div class="text-xs text-[var(--muted)] mt-1">加料：${item.toppings.length ? item.toppings.join('、') : '无'}</div>
                <div class="text-sm text-[var(--gold-deep)] font-semibold mt-2">${peso(getItemUnitPrice(item))}</div>
              </div>
              <div class="flex items-center gap-2">
                <button class="w-8 h-8 rounded-full bg-[#f5eadc]" onclick="changeCartQty('${item.id}', -1)">-</button>
                <span class="w-5 text-center">${item.qty}</span>
                <button class="w-8 h-8 rounded-full bg-[#f5eadc]" onclick="changeCartQty('${item.id}', 1)">+</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      document.getElementById('cartTotal').textContent = peso(getCartTotal());
    }

    function changeCartQty(id, delta) {
      const item = APP.state.cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) APP.state.cart = APP.state.cart.filter(x => x.id !== id);
      renderCart();
      renderCartBadge();
    }

    function openCheckout() {
      if (!APP.state.cart.length) return alert('请先添加商品');
      closeCart();
      renderCheckoutSummary();
      document.getElementById('checkoutDrawer').classList.remove('hidden');
    }

    function closeCheckout() {
      document.getElementById('checkoutDrawer').classList.add('hidden');
    }

    function renderCheckoutSummary() {
      const box = document.getElementById('checkoutSummary');
      box.innerHTML = APP.state.cart.map(item => `
        <div class="flex items-start justify-between gap-3 border-b border-[rgba(125,86,39,.08)] pb-2">
          <div>
            <div>${item.name} × ${item.qty}</div>
            <div class="text-[var(--muted)] text-xs">${item.sugar} / ${item.ice}${item.toppings.length ? ' / ' + item.toppings.join('、') : ''}</div>
          </div>
          <div class="font-medium">${peso(getItemUnitPrice(item) * item.qty)}</div>
        </div>
      `).join('') + `
        <div class="pt-2 flex items-center justify-between font-semibold">
          <span>合计</span>
          <span>${peso(getCartTotal())}</span>
        </div>
      `;
    }

    function buildOrderPayload() {
      return {
        orderNo: `TT${Date.now()}`,
        customer: {
          name: document.getElementById('customerName').value.trim(),
          phone: document.getElementById('customerPhone').value.trim(),
          address: document.getElementById('customerAddress').value.trim(),
          note: document.getElementById('customerNote').value.trim()
        },
        items: APP.state.cart.map(item => ({
          productId: item.productId,
          name: item.name,
          qty: item.qty,
          sugar: item.sugar,
          ice: item.ice,
          toppings: item.toppings,
          unitPrice: getItemUnitPrice(item),
          subtotal: getItemUnitPrice(item) * item.qty
        })),
        totalAmount: getCartTotal(),
        createdAt: new Date().toISOString()
      };
    }

    function submitOrder() {
      const payload = buildOrderPayload();
      if (!payload.customer.name) return alert('请填写联系人姓名');
      if (!payload.customer.phone) return alert('请填写联系电话');
      if (!payload.customer.address) return alert('请填写收货地址');
      console.log('DAY1_ORDER_PAYLOAD', payload);
      alert(`演示版下单成功\n订单号：${payload.orderNo}`);
      APP.state.cart = [];
      renderCartBadge();
      closeCheckout();
    }

    document.getElementById('qtyMinus').addEventListener('click', () => {
      APP.state.currentQty = Math.max(1, APP.state.currentQty - 1);
      document.getElementById('qtyValue').textContent = APP.state.currentQty;
      updateModalPriceBreakdown();
    });

    document.getElementById('qtyPlus').addEventListener('click', () => {
      APP.state.currentQty += 1;
      document.getElementById('qtyValue').textContent = APP.state.currentQty;
      updateModalPriceBreakdown();
    });

    document.getElementById('addToCartBtn').addEventListener('click', addCurrentToCart);
    document.getElementById('cartBtn').addEventListener('click', openCart);
    document.getElementById('goCheckoutBtn').addEventListener('click', openCheckout);
    document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
    document.getElementById('searchInput').addEventListener('input', (e) => {
      APP.state.search = e.target.value;
      renderProducts();
    });

    initTelegram();
    renderCategories();
    renderProducts();
    renderCartBadge();
  </script>
</body>
</html>

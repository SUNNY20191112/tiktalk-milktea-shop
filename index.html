<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TikTalk Milktea 茶语奶茶</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8f5ef; }
    .safe-bottom { padding-bottom: calc(96px + env(safe-area-inset-bottom)); }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="text-slate-800">
  <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-sm safe-bottom">
    <header class="sticky top-0 z-20 bg-amber-50 border-b border-amber-100 px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-lg font-bold">TikTalk Milktea 茶语奶茶</h1>
          <p class="text-xs text-slate-500">Telegram Mini App MVP · Day 1</p>
        </div>
        <button id="cartBtn" class="relative px-3 py-2 rounded-full bg-amber-500 text-white text-sm font-semibold">
          购物车
          <span id="cartCount" class="ml-1">0</span>
        </button>
      </div>
      <div id="categoryTabs" class="flex gap-2 overflow-x-auto pt-3 no-scrollbar"></div>
    </header>

    <main>
      <section id="productList" class="p-4 grid grid-cols-2 gap-3"></section>
    </main>
  </div>

  <div id="productModal" class="hidden fixed inset-0 z-40 bg-black/50">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-white rounded-t-3xl p-4">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="flex items-start justify-between gap-3">
        <div>
          <h2 id="modalName" class="text-lg font-bold"></h2>
          <p id="modalPrice" class="text-amber-600 font-semibold mt-1"></p>
        </div>
        <button onclick="closeProductModal()" class="text-slate-500 text-xl leading-none">×</button>
      </div>

      <div class="mt-4 space-y-4">
        <div>
          <div class="text-sm font-semibold mb-2">甜度</div>
          <div id="sugarOptions" class="flex flex-wrap gap-2"></div>
        </div>

        <div>
          <div class="text-sm font-semibold mb-2">冰度</div>
          <div id="iceOptions" class="flex flex-wrap gap-2"></div>
        </div>

        <div>
          <div class="text-sm font-semibold mb-2">加料</div>
          <div id="toppingOptions" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="flex items-center justify-between pt-2">
          <div class="flex items-center gap-3">
            <button id="qtyMinus" class="w-9 h-9 rounded-full bg-slate-100 text-lg">-</button>
            <span id="qtyValue" class="w-6 text-center font-semibold">1</span>
            <button id="qtyPlus" class="w-9 h-9 rounded-full bg-slate-100 text-lg">+</button>
          </div>
          <button id="addToCartBtn" class="px-5 py-3 rounded-full bg-amber-500 text-white font-semibold">加入购物车</button>
        </div>
      </div>
    </div>
  </div>

  <div id="cartDrawer" class="hidden fixed inset-0 z-50 bg-black/50">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-white rounded-t-3xl p-4 max-h-[85vh] overflow-hidden flex flex-col">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold">购物车</h2>
        <button onclick="closeCart()" class="text-slate-500 text-xl leading-none">×</button>
      </div>

      <div id="cartItems" class="flex-1 overflow-auto space-y-3"></div>

      <div class="border-t pt-4 mt-4 space-y-3">
        <div class="flex items-center justify-between text-base font-semibold">
          <span>合计</span>
          <span id="cartTotal">₱0</span>
        </div>
        <button id="goCheckoutBtn" class="w-full py-3 rounded-full bg-amber-500 text-white font-semibold">去结算</button>
      </div>
    </div>
  </div>

  <div id="checkoutDrawer" class="hidden fixed inset-0 z-50 bg-black/50">
    <div class="absolute inset-x-0 bottom-0 max-w-md mx-auto bg-white rounded-t-3xl p-4 max-h-[90vh] overflow-auto">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold">确认订单</h2>
        <button onclick="closeCheckout()" class="text-slate-500 text-xl leading-none">×</button>
      </div>

      <div class="space-y-3">
        <input id="customerName" class="w-full border rounded-xl px-4 py-3" placeholder="联系人姓名" />
        <input id="customerPhone" class="w-full border rounded-xl px-4 py-3" placeholder="联系电话" />
        <textarea id="customerAddress" class="w-full border rounded-xl px-4 py-3 min-h-[100px]" placeholder="收货地址"></textarea>
        <textarea id="customerNote" class="w-full border rounded-xl px-4 py-3 min-h-[90px]" placeholder="备注（选填）"></textarea>
      </div>

      <div class="mt-4 p-3 rounded-2xl bg-slate-50">
        <div class="font-semibold mb-2">订单预览</div>
        <div id="checkoutSummary" class="space-y-2 text-sm"></div>
      </div>

      <button id="submitOrderBtn" class="w-full mt-4 py-3 rounded-full bg-emerald-600 text-white font-semibold">提交订单（Day 1 为假提交）</button>
    </div>
  </div>

    function peso(n) {
      return `₱${Number(n).toFixed(0)}`;
    }

    function initTelegram() {
      if (!APP.telegram) return;
      APP.telegram.ready();
      APP.telegram.expand();
      APP.telegram.setHeaderColor('#fef3c7');
      APP.telegram.setBackgroundColor('#f8f5ef');
    }

    function buttonClass(active) {
      return active
        ? 'px-3 py-1.5 rounded-full bg-amber-500 text-white text-sm whitespace-nowrap'
        : 'px-3 py-1.5 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap';
    }

    function chipClass(active) {
      return active
        ? 'px-3 py-1.5 rounded-full bg-amber-500 text-white text-sm'
        : 'px-3 py-1.5 rounded-full bg-slate-100 text-slate-700 text-sm';
    }

    function renderCategories() {
      const wrap = document.getElementById('categoryTabs');
      wrap.innerHTML = APP.data.categories.map(cat => `
        <button class="${buttonClass(APP.state.activeCategory === cat.id)}" onclick="setCategory('${cat.id}')">${cat.name}</button>
      `).join('');
    }

    function renderProducts() {
      const list = document.getElementById('productList');
      const products = APP.data.products.filter(p => p.category === APP.state.activeCategory);
      list.innerHTML = products.map(p => `
        <button onclick="openProductModal('${p.id}')" class="text-left bg-white border border-slate-100 rounded-2xl p-3 shadow-sm">
          <div class="aspect-square rounded-xl bg-amber-50 mb-3 flex items-center justify-center text-4xl">🧋</div>
          <div class="font-semibold text-sm line-clamp-2">${p.name}</div>
          <div class="text-xs text-slate-500 mt-1 line-clamp-2">${p.desc}</div>
          <div class="mt-2 text-amber-600 font-bold">${peso(p.price)}</div>
        </button>
      `).join('');
    }

    function setCategory(id) {
      APP.state.activeCategory = id;
      renderCategories();
      renderProducts();
    }

    function openProductModal(productId) {
      const product = APP.data.products.find(p => p.id === productId);
      APP.state.currentProduct = product;
      APP.state.currentQty = 1;
      APP.state.currentSugar = '100%';
      APP.state.currentIce = '正常冰';
      APP.state.currentToppings = [];

      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = peso(product.price);
      document.getElementById('qtyValue').textContent = APP.state.currentQty;

      renderSugarOptions();
      renderIceOptions();
      renderToppings();

      document.getElementById('productModal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.add('hidden');
    }

    function renderSugarOptions() {
      const box = document.getElementById('sugarOptions');
      box.innerHTML = APP.options.sugar.map(item => `
        <button class="${chipClass(APP.state.currentSugar === item)}" onclick="selectSugar('${item}')">${item}</button>
      `).join('');
    }

    function renderIceOptions() {
      const box = document.getElementById('iceOptions');
      box.innerHTML = APP.options.ice.map(item => `
        <button class="${chipClass(APP.state.currentIce === item)}" onclick="selectIce('${item}')">${item}</button>
      `).join('');
    }

    function renderToppings() {
      const box = document.getElementById('toppingOptions');
      box.innerHTML = APP.options.toppings.map(item => {
        const active = APP.state.currentToppings.includes(item.name);
        return `
          <button class="${chipClass(active)}" onclick="toggleTopping('${item.name}')">${item.name} +${item.price}</button>
        `;
      }).join('');
    }

    function selectSugar(v) {
      APP.state.currentSugar = v;
      renderSugarOptions();
    }

    function selectIce(v) {
      APP.state.currentIce = v;
      renderIceOptions();
    }

    function toggleTopping(name) {
      const idx = APP.state.currentToppings.indexOf(name);
      if (idx >= 0) APP.state.currentToppings.splice(idx, 1);
      else APP.state.currentToppings.push(name);
      renderToppings();
    }

    function getToppingPrice(names) {
      return names.reduce((sum, name) => {
        const t = APP.options.toppings.find(x => x.name === name);
        return sum + (t ? t.price : 0);
      }, 0);
    }

    function addCurrentToCart() {
      const p = APP.state.currentProduct;
      if (!p) return;
      const item = {
        id: `cart_${Date.now()}`,
        productId: p.id,
        name: p.name,
        basePrice: p.price,
        sugar: APP.state.currentSugar,
        ice: APP.state.currentIce,
        toppings: [...APP.state.currentToppings],
        qty: APP.state.currentQty
      };
      APP.state.cart.push(item);
      renderCartBadge();
      closeProductModal();
    }

    function renderCartBadge() {
      const totalQty = APP.state.cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = totalQty;
    }

    function openCart() {
      renderCart();
      document.getElementById('cartDrawer').classList.remove('hidden');
    }

    function closeCart() {
      document.getElementById('cartDrawer').classList.add('hidden');
    }

    function getItemUnitPrice(item) {
      return item.basePrice + getToppingPrice(item.toppings);
    }

    function getCartTotal() {
      return APP.state.cart.reduce((sum, item) => sum + getItemUnitPrice(item) * item.qty, 0);
    }

    function renderCart() {
      const box = document.getElementById('cartItems');
      if (!APP.state.cart.length) {
        box.innerHTML = '<div class="text-sm text-slate-500 text-center py-10">购物车还是空的</div>';
      } else {
        box.innerHTML = APP.state.cart.map(item => `
          <div class="border rounded-2xl p-3">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="font-semibold">${item.name}</div>
                <div class="text-xs text-slate-500 mt-1">甜度 ${item.sugar} · 冰度 ${item.ice}</div>
                <div class="text-xs text-slate-500 mt-1">加料：${item.toppings.length ? item.toppings.join('、') : '无'}</div>
                <div class="text-sm text-amber-600 font-semibold mt-2">${peso(getItemUnitPrice(item))}</div>
              </div>
              <div class="flex items-center gap-2">
                <button class="w-8 h-8 rounded-full bg-slate-100" onclick="changeCartQty('${item.id}', -1)">-</button>
                <span class="w-5 text-center">${item.qty}</span>
                <button class="w-8 h-8 rounded-full bg-slate-100" onclick="changeCartQty('${item.id}', 1)">+</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      document.getElementById('cartTotal').textContent = peso(getCartTotal());
    }

    function changeCartQty(id, delta) {
      const item = APP.state.cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        APP.state.cart = APP.state.cart.filter(x => x.id !== id);
      }
      renderCart();
      renderCartBadge();
    }

    function openCheckout() {
      if (!APP.state.cart.length) {
        alert('请先添加商品');
        return;
      }
      closeCart();
      renderCheckoutSummary();
      document.getElementById('checkoutDrawer').classList.remove('hidden');
    }

    function closeCheckout() {
      document.getElementById('checkoutDrawer').classList.add('hidden');
    }

    function renderCheckoutSummary() {
      const box = document.getElementById('checkoutSummary');
      box.innerHTML = APP.state.cart.map(item => `
        <div class="flex items-start justify-between gap-3">
          <div>
            <div>${item.name} × ${item.qty}</div>
            <div class="text-slate-500 text-xs">${item.sugar} / ${item.ice}${item.toppings.length ? ' / ' + item.toppings.join('、') : ''}</div>
          </div>
          <div class="font-medium">${peso(getItemUnitPrice(item) * item.qty)}</div>
        </div>
      `).join('') + `
        <div class="pt-2 border-t flex items-center justify-between font-semibold">
          <span>合计</span>
          <span>${peso(getCartTotal())}</span>
        </div>
      `;
    }

    function buildOrderPayload() {
      return {
        orderNo: `TT${Date.now()}`,
        customer: {
          name: document.getElementById('customerName').value.trim(),
          phone: document.getElementById('customerPhone').value.trim(),
          address: document.getElementById('customerAddress').value.trim(),
          note: document.getElementById('customerNote').value.trim()
        },
        items: APP.state.cart.map(item => ({
          productId: item.productId,
          name: item.name,
          qty: item.qty,
          sugar: item.sugar,
          ice: item.ice,
          toppings: item.toppings,
          unitPrice: getItemUnitPrice(item),
          subtotal: getItemUnitPrice(item) * item.qty
        })),
        totalAmount: getCartTotal(),
        createdAt: new Date().toISOString()
      };
    }

    function submitOrder() {
      const payload = buildOrderPayload();
      if (!payload.customer.name) return alert('请填写联系人姓名');
      if (!payload.customer.phone) return alert('请填写联系电话');
      if (!payload.customer.address) return alert('请填写收货地址');

      console.log('DAY1_ORDER_PAYLOAD', payload);
      alert(`Day 1 假提交成功\n订单号：${payload.orderNo}\n已输出到 console.log`);

      APP.state.cart = [];
      renderCartBadge();
      closeCheckout();
    }

    document.getElementById('qtyMinus').addEventListener('click', () => {
      APP.state.currentQty = Math.max(1, APP.state.currentQty - 1);
      document.getElementById('qtyValue').textContent = APP.state.currentQty;
    });

    document.getElementById('qtyPlus').addEventListener('click', () => {
      APP.state.currentQty += 1;
      document.getElementById('qtyValue').textContent = APP.state.currentQty;
    });

    document.getElementById('addToCartBtn').addEventListener('click', addCurrentToCart);
    document.getElementById('cartBtn').addEventListener('click', openCart);
    document.getElementById('goCheckoutBtn').addEventListener('click', openCheckout);
    document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);

    initTelegram();
    renderCategories();
    renderProducts();
    renderCartBadge();
  </script>
</body>
</html>
